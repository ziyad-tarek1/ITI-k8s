# Requires a CNI that ENFORCES policy. kind's default (kindnet) does not --
# that is by design, not a bug (kubernetes-sigs/kind#3705). Without Calico
# these policies apply cleanly and enforce NOTHING, which is worse than having
# none at all. Create the Day 4 cluster like this instead:
#
#   kind: Cluster
#   apiVersion: kind.x-k8s.io/v1alpha4
#   networking:
#     disableDefaultCNI: true       # config field, NOT a CLI flag
#     podSubnet: "192.168.0.0/16"   # what Calico's manifest expects
#
# then: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/calico.yaml
# Pods stay Pending until Calico is running -- that is expected, not a failure.
#
# Start by denying everything in the namespace, then open the paths we need.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: vote
spec:
  podSelector: {}            # every Pod in the namespace
  policyTypes: [Ingress]
---
# redis accepts connections only from vote (writes) and worker (reads).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-allow
  namespace: vote
spec:
  podSelector:
    matchLabels: {app: redis}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {matchLabels: {app: vote}}
        - podSelector: {matchLabels: {app: worker}}
      ports:
        - {protocol: TCP, port: 6379}
---
# db accepts connections only from worker (writes) and result (reads).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-allow
  namespace: vote
spec:
  podSelector:
    matchLabels: {app: db}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {matchLabels: {app: worker}}
        - podSelector: {matchLabels: {app: result}}
      ports:
        - {protocol: TCP, port: 5432}
---
# The two frontends are reachable from anywhere (the Ingress controller lives
# in another namespace, so allow that too).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-allow
  namespace: vote
spec:
  podSelector:
    matchExpressions:
      - {key: app, operator: In, values: [vote, result]}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - {protocol: TCP, port: 80}
