apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: vote
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: vote
spec:
  replicas: 1
  selector:
    matchLabels: {app: redis}
  template:
    metadata:
      labels: {app: redis}
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports: [{containerPort: 6379}]
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits:   {cpu: 250m, memory: 256Mi}
          readinessProbe:
            exec: {command: ["redis-cli", "ping"]}
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket: {port: 6379}
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - {name: data, mountPath: /data}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: redis-data}
---
apiVersion: v1
kind: Service
metadata:
  name: redis          # MUST be "redis" — the apps default to this hostname
  namespace: vote
spec:
  selector: {app: redis}
  ports:
    - {port: 6379, targetPort: 6379}
