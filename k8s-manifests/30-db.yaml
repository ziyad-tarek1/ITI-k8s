apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-data
  namespace: vote
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: vote
spec:
  replicas: 1
  selector:
    matchLabels: {app: db}
  strategy:
    type: Recreate          # one RWO disk: never run two Pods at once
  template:
    metadata:
      labels: {app: db}
    spec:
      containers:
        - name: postgres
          image: postgres:14
          ports: [{containerPort: 5432}]
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef: {name: vote-config, key: DB_USER}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: {name: db-secret, key: POSTGRES_PASSWORD}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits:   {cpu: 500m, memory: 512Mi}
          readinessProbe:
            exec: {command: ["pg_isready", "-U", "postgres"]}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec: {command: ["pg_isready", "-U", "postgres"]}
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: db-data}
---
apiVersion: v1
kind: Service
metadata:
  name: db             # MUST be "db" — the apps default to this hostname
  namespace: vote
spec:
  selector: {app: db}
  ports:
    - {port: 5432, targetPort: 5432}
