# One external entry point, two backends, routed by path.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vote
  namespace: vote
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: vote.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vote
                port: {number: 80}
    - host: result.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: result
                port: {number: 80}
